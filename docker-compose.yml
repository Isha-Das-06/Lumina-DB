version: '3.8'

services:
  node1:
    build: .
    command: ["-id", "node1", "-addr", ":50051", "-peers", "node2:50051,node3:50051", "-logdir", "/app/data"]
    ports:
      - "50051:50051"
    volumes:
      - node1_data:/app/data

  node2:
    build: .
    command: ["-id", "node2", "-addr", ":50051", "-peers", "node1:50051,node3:50051", "-logdir", "/app/data"]
    ports:
      - "50052:50051"
    volumes:
      - node2_data:/app/data

  node3:
    build: .
    command: ["-id", "node3", "-addr", ":50051", "-peers", "node1:50051,node2:50051", "-logdir", "/app/data"]
    ports:
      - "50053:50051"
    volumes:
      - node3_data:/app/data

volumes:
  node1_data:
  node2_data:
  node3_data:
